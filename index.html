<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to our website">
    <title>Welcome - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <nav class="navbar" role="navigation" aria-label="Main navigation">
            <div class="navbar__container">
                <div class="navbar__logo">
                    <img src="logo.svg" alt="Company Logo" class="logo__image" width="150" height="50">
                </div>
                <div class="navbar__actions">
                    <button class="btn btn--login" id="loginBtn" aria-label="Login to your account">
                        Login
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="banner" aria-label="Hero banner">
            <img src="banner.jpg" alt="Welcome banner showcasing our services" class="banner__image">
            <div class="banner__overlay">
                <h1 class="banner__title">Welcome to Our Website</h1>
                <p class="banner__subtitle">Discover amazing experiences with us</p>
            </div>
        </section>

        <section class="content" aria-label="Main content">
            <div class="content__container">
                <h2>About Us</h2>
                <p>We provide exceptional services to help you achieve your goals.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <p>© 2024 Your Company. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
